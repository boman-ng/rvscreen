name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux-x86_64:
    name: Build Linux release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            libclang-dev \
            llvm-dev \
            pkg-config \
            zlib1g-dev

      - name: Configure libclang
        shell: bash
        run: |
          libclang_path="$(find /usr/lib -name 'libclang.so*' -print -quit)"
          if [[ -z "${libclang_path}" ]]; then
            echo "libclang.so was not found after installing libclang-dev" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "${libclang_path}")" >> "${GITHUB_ENV}"

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, got: ${release_tag}" >&2
            exit 1
          fi

          crate_version="$(cargo pkgid --locked | sed 's/.*#//')"
          expected_tag="v${crate_version}"
          if [[ "${release_tag}" != "${expected_tag}" ]]; then
            echo "Release tag ${release_tag} does not match Cargo.toml version ${crate_version}" >&2
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${crate_version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: cargo test --locked --workspace

      - name: Build release binary
        run: cargo build --locked --release --bin rvscreen

      - name: Package Linux artifact
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          target="x86_64-unknown-linux-gnu"
          package="rvscreen-${version}-${target}"

          mkdir -p "dist/${package}"
          cp target/release/rvscreen "dist/${package}/rvscreen"

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          sha256sum "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: rvscreen ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
